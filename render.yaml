services:
  - type: web
    name: spin-bottle-bot
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: BOT_TOKEN
        sync: false          # Render Dashboard-da əl ilə daxil edəcəksiniz (məxfi)
      - key: WEBAPP_URL
        sync: false          # Render sizə verdiyi https://xxx.onrender.com ünvanını yazın
      - key: DATABASE_URL
        fromDatabase:
          name: spin-bottle-db
          property: connectionString
      - key: PORT
        value: 3000
      - key: STARTING_HEARTS
        value: 33
      - key: STARTING_CHANCES
        value: 1

databases:
  - name: spin-bottle-db
    plan: free
    databaseName: spin_bottle
    user: spin_bottle_user
